<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Invoice Pro - Enterprise Billing Systems</title>
    
    <!-- Base Critical Layout Rules Routing Styles -->
    <style>
        :root {
            --bg-main: #0f172a;
            --text-primary: #f8fafc;
            --primary-color: #4f46e5;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gateway-loader {
            text-align: center;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        .gateway-title {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.025em;
            opacity: 0.8;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <!-- Client-Side Authorization Routing Script Engine -->
    <script>
        (function() {
            try {
                // Parse LocalStorage structures generated by auth.js
                const activeSession = localStorage.getItem('bg_invoice_session');
                const rememberMe = localStorage.getItem('bg_invoice_remember');
                
                // Establish destination route paths target variables
                let routingTarget = 'login.html';

                if (activeSession) {
                    const sessionData = JSON.parse(activeSession);
                    const currentTime = new Date().getTime();
                    
                    // Verify if current timestamp falls inside valid login window duration bounds
                    if (sessionData && sessionData.expiry > currentTime) {
                        routingTarget = 'dashboard.html';
                    } else {
                        // Clear clean structures if storage data window expired
                        localStorage.removeItem('bg_invoice_session');
                    }
                }

                // Append an ultra-clean transitional timeout block delay window
                setTimeout(function() {
                    window.location.replace(routingTarget);
                }, 400);

            } catch (error) {
                console.error("Routing Exception Handled:", error);
                window.location.replace('login.html');
            }
        })();
    </script>
</head>
<body>

    <!-- Transitional Structural Splash Screen UI Container -->
    <div class="gateway-loader">
        <div class="spinner"></div>
        <div class="gateway-title">Initializing Secure Session Environment...</div>
    </div>

</body>
</html>
