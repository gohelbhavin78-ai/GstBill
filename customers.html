<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer CRM | BG Invoice Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar and top bar markup matches dashboard structural layout -->
        <div id="content" class="w-100">
            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-bold text-dark mb-1">Customer Registry</h4>
                        <p class="text-muted small mb-0">Manage customer profile accounts and tracking records.</p>
                    </div>
                    <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#customerModal" onclick="CustomerModule.resetForm()">
                        <i class="fa-solid fa-plus me-2"></i>Add Customer
                    </button>
                </div>

                <!-- Live Client Table Search Registry Card -->
                <div class="card workspace-card border-0 shadow-sm p-4">
                    <div class="mb-3 col-md-4">
                        <input type="text" id="searchCustomer" class="form-control" placeholder="Search customer directory...">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Client ID</th>
                                    <th>Business Entity Name</th>
                                    <th>GSTIN Registration</th>
                                    <th>Mobile Connection</th>
                                    <th>Email Link</th>
                                    <th>State Zone</th>
                                    <th class="text-end">Modifications</th>
                                </tr>
                            </thead>
                            <tbody id="customerTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Handling Window Modal Dialog Frame -->
    <div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content rounded-4 border-0 shadow">
                <form id="customerForm" class="needs-validation" novalidate>
                    <div class="modal-header border-bottom">
                        <h5 class="modal-title fw-bold" id="modalTitle">Register Customer</h5>
                        <button type="button" class="btn-close" data-bs-toggle="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="customerId">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Entity Name</label>
                            <input type="text" class="form-control" id="custName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">GSTIN Identification</label>
                            <input type="text" class="form-control" id="custGstin" placeholder="22AAAAA0000A1Z5">
                        </div>
                        <div class="row g-2">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold">Mobile Phone</label>
                                <input type="tel" class="form-control" id="custMobile" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold">Email Address</label>
                                <input type="email" class="form-control" id="custEmail" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Billing Workspace Address</label>
                            <textarea class="form-control" id="custAddress" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Taxation Jurisdiction State</label>
                            <input type="text" class="form-control" id="custState" placeholder="e.g. Maharashtra" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-custom">Commit Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/customer.js"></script>
</body>
</html>
