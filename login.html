<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BG Invoice Pro</title>
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <!-- Login Card -->
                <div class="card auth-card shadow-lg border-0 p-4">
                    <div class="card-body text-center">
                        <!-- Brand Identity -->
                        <div class="brand-logo mb-3">
                            <i class="fa-solid fa-file-invoice-dollar fa-3x text-primary-custom"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1">BG Invoice Pro</h3>
                        <p class="text-muted small mb-4">GST Billing & Business Intelligence</p>

                        <!-- Error Alert Placeholder -->
                        <div id="authAlert" class="alert alert-danger d-none small text-start" role="alert">
                            <i class="fa-solid fa-circle-exclamation me-2"></i> <span id="authAlertText"></span>
                        </div>

                        <!-- Login Form -->
                        <form id="loginForm" class="needs-validation text-start" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label small fw-semibold text-secondary">Username / Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-user"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="username" required autocomplete="username">
                                    <div class="invalid-feedback">Please enter your username or email.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                                    <a href="#" id="forgotPasswordLink" class="small text-decoration-none text-secondary-custom fw-medium">Forgot?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="password" required autocomplete="current-password">
                                    <button type="button" class="input-group-text bg-white border-start-0 text-muted" id="togglePassword">
                                        <i class="fa-regular fa-eye" id="passwordIcon"></i>
                                    </button>
                                    <div class="invalid-feedback">Please enter your password.</div>
                                </div>
                            </div>

                            <div class="mb-4 form-check d-flex justify-content-between align-items-center ps-0">
                                <div class="form-check-checkbox">
                                    <input type="checkbox" class="form-check-input ms-0 me-2" id="rememberMe">
                                    <label class="form-check-label small text-muted user-select-none" for="rememberMe">Remember this device</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fw-semibold shadow-sm transition-all" id="loginBtn">
                                <span id="btnText">Sign In</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <p class="text-muted small">&copy; 2026 BG Invoice Pro. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Modular Authentication Framework -->
    <script src="js/auth.js"></script>
</body>
</html>
